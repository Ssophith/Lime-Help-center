# Nginx configuration for help.lime.mn (HTTP only - SSL will be added by certbot)
# Place this file in /etc/nginx/sites-available/help.lime.mn
# Then create symlink: ln -s /etc/nginx/sites-available/help.lime.mn /etc/nginx/sites-enabled/
# Test: nginx -t
# Reload: systemctl reload nginx
# Then run: certbot --nginx -d help.lime.mn

# Rate limiting
limit_req_zone $binary_remote_addr zone=limekb_limit:10m rate=10r/s;

# Upstream for Next.js app (PM2)
upstream limekb_backend {
    least_conn;
    server 127.0.0.1:3010 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name help.lime.mn;

    # Logging
    access_log /var/log/nginx/limekb-access.log;
    error_log /var/log/nginx/limekb-error.log;

    # Max body size for file uploads
    client_max_body_size 50M;
    client_body_buffer_size 128k;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Rate limiting
    limit_req zone=limekb_limit burst=20 nodelay;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Root location
    root /home/admin/limekb/public;
    index index.html;

    # Static files caching
    location /_next/static/ {
        alias /home/admin/limekb/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public folder
    location /public/ {
        alias /home/admin/limekb/public/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Proxy all requests to Next.js
    location / {
        proxy_pass http://limekb_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Don't pass these headers
        proxy_set_header Accept-Encoding "";
    }

    # Health check endpoint (optional)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

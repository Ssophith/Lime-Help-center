version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kb_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: limekb
      POSTGRES_PASSWORD: lime123
      POSTGRES_DB: limekb
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limekb -d limekb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: